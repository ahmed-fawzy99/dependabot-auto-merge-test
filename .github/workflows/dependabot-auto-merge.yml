name: Dependabot auto-merge

on:
  pull_request:
  # workflow_dispatch is here only so the merge decision can be exercised
  # locally with `act` (fetch-metadata needs the live API, so we inject the
  # update type directly and run in dry-run mode). It is a no-op in production.
  workflow_dispatch:
    inputs:
      update_type:
        description: "Simulated Dependabot update-type for local testing"
        required: false
        default: "version-update:semver-patch"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on Dependabot's own PRs (or a manual dry-run dispatch).
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        if: github.event_name == 'pull_request'
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        env:
          # Real runs read the type from Dependabot metadata; dispatch runs
          # take it from the input so `act` can drive each branch.
          UPDATE_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.update_type || steps.meta.outputs.update-type }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Update type: ${UPDATE_TYPE:-<none>}"
          case "$UPDATE_TYPE" in
            version-update:semver-patch|version-update:semver-minor)
              if [ "$DRY_RUN" = "true" ]; then
                echo "✅ [dry-run] would auto-merge $UPDATE_TYPE"
              else
                echo "✅ Auto-merging $UPDATE_TYPE: $PR_URL"
                gh pr merge --merge "$PR_URL"
              fi
              ;;
            version-update:semver-major)
              echo "⏭️  $UPDATE_TYPE requires manual review — not merging."
              ;;
            *)
              echo "ℹ️  No mergeable update-type detected ('$UPDATE_TYPE') — nothing to do."
              ;;
          esac
